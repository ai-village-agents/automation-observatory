<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visitor Memories - The Automation Observatory 🔍</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #00ff88;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 2px solid #00ff88;
            padding-bottom: 20px;
        }

        h1 {
            font-size: 2.5em;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
            margin-bottom: 10px;
        }

        .nav-back {
            display: inline-block;
            margin-bottom: 20px;
            padding: 10px 20px;
            background: #1a1f3a;
            border: 2px solid #00ff88;
            color: #00ff88;
            text-decoration: none;
            cursor: pointer;
            font-family: 'Monaco', monospace;
            transition: all 0.3s ease;
        }

        .nav-back:hover {
            background: #00ff88;
            color: #0a0e27;
        }

        .search-box {
            background: rgba(0, 255, 136, 0.05);
            border: 2px solid #00ff88;
            padding: 20px;
            border-radius: 5px;
            margin-bottom: 30px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .search-input {
            flex: 1;
            min-width: 250px;
            padding: 12px;
            background: rgba(0, 255, 136, 0.05);
            border: 1px solid #00ff88;
            color: #00ff88;
            font-family: 'Monaco', monospace;
            border-radius: 3px;
        }

        .search-input:focus {
            outline: none;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.5);
            border-color: #00ccff;
        }

        .filter-btn {
            background: #00ff88;
            color: #0a0e27;
            border: none;
            padding: 12px 25px;
            border-radius: 3px;
            cursor: pointer;
            font-family: 'Monaco', monospace;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .filter-btn:hover {
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.8);
        }

        .filter-btn.active {
            background: #00ccff;
        }

        .filter-tags {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        .tag {
            background: rgba(0, 204, 255, 0.2);
            border: 1px solid #00ccff;
            color: #00ccff;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s ease;
        }

        .tag:hover {
            background: rgba(0, 204, 255, 0.4);
        }

        .tag.active {
            background: #00ccff;
            color: #0a0e27;
            font-weight: bold;
        }

        .memories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .memory-card {
            border: 2px solid #00ff88;
            background: rgba(10, 14, 39, 0.8);
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .memory-card:hover {
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
            transform: translateY(-5px);
        }

        .memory-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
            border-bottom: 1px solid #00ff88;
            padding-bottom: 10px;
        }

        .memory-visitor {
            color: #00ccff;
            font-weight: bold;
            font-size: 1.1em;
        }

        .memory-date {
            color: #00ff88;
            font-size: 0.8em;
            opacity: 0.7;
        }

        .memory-pattern {
            display: inline-block;
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid #00ff88;
            color: #00ff88;
            padding: 4px 10px;
            border-radius: 3px;
            font-size: 0.85em;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .memory-severity {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 3px;
            font-size: 0.85em;
            margin-left: 5px;
            font-weight: bold;
        }

        .memory-severity.minor {
            background: rgba(0, 255, 136, 0.1);
            color: #00ff88;
            border: 1px solid #00ff88;
        }

        .memory-severity.significant {
            background: rgba(0, 204, 255, 0.1);
            color: #00ccff;
            border: 1px solid #00ccff;
        }

        .memory-severity.critical {
            background: rgba(255, 107, 107, 0.1);
            color: #ff6b6b;
            border: 1px solid #ff6b6b;
        }

        .memory-text {
            color: #00ff88;
            line-height: 1.6;
            font-size: 0.95em;
            margin-bottom: 10px;
        }

        .memory-meta {
            display: flex;
            justify-content: space-between;
            padding-top: 10px;
            border-top: 1px solid rgba(0, 255, 136, 0.2);
            font-size: 0.85em;
            color: #00ccff;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #00ccff;
        }

        .empty-state p {
            font-size: 1.2em;
            margin-bottom: 10px;
        }

        .stats-panel {
            border: 2px solid #00ccff;
            background: rgba(10, 14, 39, 0.8);
            padding: 25px;
            border-radius: 5px;
            margin-bottom: 30px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .stat-item {
            background: rgba(0, 255, 136, 0.05);
            border: 1px solid #00ff88;
            padding: 15px;
            border-radius: 3px;
            text-align: center;
        }

        .stat-value {
            font-size: 2em;
            color: #00ff88;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        .stat-label {
            color: #00ccff;
            font-size: 0.9em;
            margin-top: 5px;
        }

        @media (max-width: 768px) {
            .memories-grid {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 1.8em;
            }

            .search-box {
                flex-direction: column;
            }

            .filter-tags {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="nav-back">← Return to Observatory</a>

        <header>
            <h1>💾 Visitor Memories Archive</h1>
            <p style="color: #00ccff; margin-top: 10px;">Searchable collection of all permanent visitor marks</p>
        </header>

        <div class="stats-panel">
            <h2 style="color: #00ccff; margin-bottom: 20px;">📊 Archive Statistics</h2>
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-value" id="total-memories">-</div>
                    <div class="stat-label">Total Memories</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="unique-visitors">-</div>
                    <div class="stat-label">Unique Observers</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="oldest-memory">-</div>
                    <div class="stat-label">Archive Age (Days)</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="critical-count">-</div>
                    <div class="stat-label">Critical Reports</div>
                </div>
            </div>
        </div>

        <div class="search-box">
            <input type="text" id="search-input" class="search-input" placeholder="Search memories...">
            <button class="filter-btn" onclick="clearSearch()">Clear Filters</button>
            <button class="filter-btn" onclick="sortByDate()">Sort by Date</button>
            <button class="filter-btn" onclick="sortBySeverity()">Sort by Severity</button>
        </div>

        <div class="filter-tags" id="filter-tags"></div>

        <div class="memories-grid" id="memories-grid">
            <div class="empty-state">
                <p>📖 No memories yet.</p>
                <p style="color: #00ff88;">Submit your first anomaly report to begin the archive!</p>
            </div>
        </div>
    </div>

    <script>
        let allMemories = [];
        let filteredMemories = [];
        let currentFilter = null;

        // Load memories from localStorage
        function loadMemories() {
            allMemories = JSON.parse(localStorage.getItem('observatory-marks') || '[]');
            filteredMemories = [...allMemories];
            updateStats();
            renderMemories();
            renderFilterTags();
        }

        function updateStats() {
            const total = allMemories.length;
            const visitors = new Set(allMemories.map(m => m.visitor)).size;
            const critical = allMemories.filter(m => m.severity === 'critical').length;
            
            document.getElementById('total-memories').textContent = total || '0';
            document.getElementById('unique-visitors').textContent = visitors || '0';
            document.getElementById('critical-count').textContent = critical || '0';
            document.getElementById('oldest-memory').textContent = total > 0 ? '1' : '-';
        }

        function renderFilterTags() {
            const patterns = ['exponential', 'incremental', 'clockwork', 'unknown'];
            const tagsContainer = document.getElementById('filter-tags');
            tagsContainer.innerHTML = '';
            
            patterns.forEach(pattern => {
                const count = allMemories.filter(m => m.pattern === pattern).length;
                if (count > 0) {
                    const tag = document.createElement('div');
                    tag.className = 'tag';
                    tag.textContent = `${pattern.charAt(0).toUpperCase() + pattern.slice(1)} (${count})`;
                    tag.onclick = () => filterByPattern(pattern, tag);
                    tagsContainer.appendChild(tag);
                }
            });
        }

        function filterByPattern(pattern, element) {
            element.classList.toggle('active');
            if (element.classList.contains('active')) {
                currentFilter = pattern;
                filteredMemories = allMemories.filter(m => m.pattern === pattern);
            } else {
                currentFilter = null;
                filteredMemories = [...allMemories];
            }
            renderMemories();
        }

        function renderMemories() {
            const grid = document.getElementById('memories-grid');
            
            if (filteredMemories.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <p>🔍 No memories match your search.</p>
                        <p style="color: #00ff88;">Try a different filter or search term.</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = filteredMemories.map((memory, index) => `
                <div class="memory-card">
                    <div class="memory-header">
                        <div>
                            <div class="memory-visitor">${memory.visitor}</div>
                            <div class="memory-date">${memory.timestamp}</div>
                        </div>
                    </div>
                    <div>
                        <span class="memory-pattern">${memory.pattern.charAt(0).toUpperCase() + memory.pattern.slice(1)}</span>
                        <span class="memory-severity ${memory.severity}">${memory.severity.charAt(0).toUpperCase() + memory.severity.slice(1)}</span>
                    </div>
                    <div class="memory-text">"${memory.observation}"</div>
                    <div class="memory-meta">
                        <span>#${index + 1} in archive</span>
                        <span>Permanent ✓</span>
                    </div>
                </div>
            `).join('');
        }

        function clearSearch() {
            document.getElementById('search-input').value = '';
            document.querySelectorAll('.tag.active').forEach(tag => tag.classList.remove('active'));
            currentFilter = null;
            filteredMemories = [...allMemories];
            renderMemories();
        }

        function sortByDate() {
            filteredMemories.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
            renderMemories();
        }

        function sortBySeverity() {
            const severityOrder = { critical: 0, significant: 1, minor: 2 };
            filteredMemories.sort((a, b) => severityOrder[a.severity] - severityOrder[b.severity]);
            renderMemories();
        }

        // Search functionality
        document.getElementById('search-input')?.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            if (query) {
                filteredMemories = allMemories.filter(m => 
                    m.visitor.toLowerCase().includes(query) ||
                    m.observation.toLowerCase().includes(query) ||
                    m.pattern.toLowerCase().includes(query)
                );
            } else {
                filteredMemories = [...allMemories];
            }
            renderMemories();
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', loadMemories);
        
        // Update every 10 seconds
        setInterval(loadMemories, 10000);
    </script>
</body>
</html>
